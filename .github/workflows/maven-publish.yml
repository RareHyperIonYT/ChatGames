name: Build ChatGames

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Zmieniono z 17 na 21, aby pasowało do chatgames-api
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ChatGames-Jars
          path: |
            spigot/target/ChatGames-Spigot-*.jar
            paper/target/ChatGames-Paper-*.jar
            folia/target/ChatGames-Folia-*.jar
            sponge/target/ChatGames-Sponge-*.jar
