name: Build ChatGames

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Krok 1: Pobranie kodu źródłowego (v4)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Krok 2: Konfiguracja JDK (Projekt używa Java 8 zgodnie z pom.xml)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Zalecane do uruchamiania Mavena, skompiluje do celu Java 8
          distribution: 'temurin'
          cache: maven

      # Krok 3: Budowanie projektu za pomocą Maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml

      # Krok 4: Przesłanie plików .jar jako artefaktów (v4)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ChatGames-Jars
          path: |
            spigot/target/ChatGames-Spigot-*.jar
            paper/target/ChatGames-Paper-*.jar
            folia/target/ChatGames-Folia-*.jar
            sponge/target/ChatGames-Sponge-*.jar
