# ChatGames Configuration
# https://github.com/RareHyperIon/ChatGames

# Available: en-us
language: en-us

# Interval between automatic games (in seconds)
game-interval: 300

# Minimum players online to start automatic games
minimum-players: 1

# Whether to automatically start games at intervals
automatic-games: true

# Cooldown after wrong answer in multiple choice (in ticks, 20 ticks = 1 second)
answer-cooldown-ticks: 60

# Enable debug logging
debug: false

# Database configuration (MariaDB) for the points system
# Points are awarded when a player wins a chatgame (+1 per win)
# Use PlaceholderAPI: %chatgames_points% or %chatgames_points_<player>%
database:
  enabled: false
  host: localhost
  port: 3306
  database: minecraft
  username: root
  password: ""
  pool-size: 5